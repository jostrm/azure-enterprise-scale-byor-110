  # === Policy Exemptions (Foundry ACA subnet safety) ===
  # Prevents deployIfNotExists/auditIfNotExists remediation tasks from mutating the ACA subnet
  # while AI Foundry Standard Agent performs network injection — avoids 409 conflicts on capability host.
  # To discover IDs: az policy assignment list --scope /subscriptions/<sub>/resourceGroups/<vnetRG> --query "[].id" -o tsv
